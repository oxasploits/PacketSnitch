<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PCAP Analysis Tool (by: oxagast)</title>

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Rubik+Glitch&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <style>
      body {
        background-image: url("background.jpg");
        background-repeat: no-repeat; /* Prevents the image from tiling */
        background-size: cover; /* Scales the image to cover the entire container */
        background-attachment: fixed; /* Keeps the background image in place when scrolling */
      }
    </style>
  </head>

  <body>
    <div class="container_box">
      <div class="top_bar">PacketSnitch</div>

      <div class="entry_bar">
        <div class="logo-cont">
          <img src="logo.png" />
        </div>
        <label style="color: white">ip/hostname:</label>
        <input id="host_filter" type="text" placeholder="0.0.0.0" />
      </div>

      <div class="content_area">
        <div class="sidebar">
          <form
            method="post"
            enctype="multipart/form-data"
            id="jsonFile"
            name="jsonFile"
          >
            <input type="file" id="json-upload" name="json-up" hidden />
            <label for="json-upload" class="custom-upload">choose json</label>
          </form>
          <form
            method="post"
            enctype="multipart/form-data"
            id="pcapFile"
            name="pcapFile"
          >
            <input type="file" id="pcap-upload" name="pcap-up" hidden />
            <label for="pcap-upload" class="custom-upload">choose pcap</label>
          </form>

          <!-- Dropdown menus -->
          <select id="target_hosts">
            <option>ALL hosts</option>
            <option>Localnet Hosts</option>
          </select>
        </div>

        <div id="content_area" class="main_panel">
          Analysis output will appear here...
        </div>
      </div>

      <div id="status" class="status_bar">Status: Ready</div>

      <div class="footer">oxasploits, llc (2026)</div>
    </div>
    <script type="text/javascript">
      const contentTarget = document.getElementById("json-upload");
      // script.js
      const form = document.getElementById("pcapFile");
      const fileInput = document.getElementById("pcap-upload");
      const status = document.getElementById("status");

      form.addEventListener("submit", function (event) {
        // Prevent the default form submission that would refresh the page
        event.preventDefault();

        // Get the selected file(s) from the input element
        const files = fileInput.files;

        if (files.length > 0) {
          const file = files[0];

          // Create a FormData object to hold the file data
          const formData = new FormData();
          // Append the file to the FormData object, using the 'name' attribute from the HTML input
          formData.append("myFile", file, file.name);

          // Use the fetch API to send the file to the server
          fetch("/upload-endpoint", {
            // Replace with your backend endpoint URL
            method: "POST", // Use POST method
            body: formData, // The FormData object automatically sets the correct Content-Type header
          })
            .then((response) => response.json())
            .then((data) => {
              console.log("Success:", data);
              status.textContent = "File successfully uploaded!";
            })
            .catch((error) => {
              console.error("Error:", error);
              status.textContent = "File upload failed!";
            });
        } else {
          status.textContent = "Please select a file.";
        }
      });

      document
        .getElementById("json-upload")
        .addEventListener("change", function (event) {
          const file = event.target.files[0]; // Get the selected files as a FileList
          var input = document.getElementById("json-upload");
          if (file) {
            console.log("Selected file:", file.name);
            readFileContent(file);
          }
        });

      // Function to read the file content using FileReader
      function readFileContent(file) {
        const reader = new FileReader();

        // Define what happens when the file is loaded
        reader.onload = (event) => {
          // The file content is available in event.target.result
          main_panel = document.getElementById("content_area");
          console.log("File content:", event.target.result);
          packets = JSON.parse(event.target.result);
          // iterate over the json values in the "Host" field and print the next key to main main_panel
          for (const host in packets["Host"]) {
            console.log("Host:", host);
            console.log("Next key:", packets["Host"][host]);
          }
          document.getElementById("content_area").textContent = packets["Host"];
        };

        // Define what happens if an error occurs
        reader.onerror = (error) => {
          console.error("Error reading file:", error);
        };

        // Start reading the file as text (other methods available for different file types)
        // Use readAsText() for text files like .txt, .csv, .json
        // Use readAsDataURL() for images or other binary files to get a data URL
        reader.readAsText(file);
      }
    </script>
    <br />
  </body>
</html>
