<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PCAP Analysis Tool (by: oxagast)</title>

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Rubik+Glitch&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <style>
      body {
        background-image: url("background.jpg");
        background-repeat: no-repeat; /* Prevents the image from tiling */
        background-size: cover; /* Scales the image to cover the entire container */
        background-attachment: fixed; /* Keeps the background image in place when scrolling */
      }
    </style>
  </head>

  <body>
    <div class="container_box">
      <div class="top_bar">PCAP Analysis Tool by oxagast</div>

      <div class="entry_bar">
        <div class="logo-cont">
          <img src="logo.png" />
        </div>
        <label style="color: white">ip/hostname:</label>
        <input type="text" placeholder="0.0.0.0" />
      </div>

      <div class="content_area">
        <div class="sidebar">
          <form
            method="post"
            enctype="multipart/form-data"
            id="jsonFile"
            name="jsonFile"
          >
            <input type="file" id="pcap-upload" name="pcap-up" hidden />
            <label for="pcap-upload" class="custom-pcap-upload"
              >choose pcap</label
            >
          </form>

          <!-- Dropdown menus -->
          <select>
            <option>Protocol Filter</option>
            <option>TCP</option>
            <option>UDP</option>
            <option>ICMP</option>
          </select>

          <select>
            <option>Time Range</option>
            <option>Last 5 min</option>
            <option>Last 30 min</option>
            <option>Full Capture</option>
          </select>
        </div>

        <div id="content_area" class="main_panel">
          Analysis output will appear here...
        </div>
      </div>

      <div class="status_bar">Status: Ready</div>
    </div>
    <script type="text/javascript">
      const contentTarget = document.getElementById("pcap-upload");

      document
        .getElementById("pcap-upload")
        .addEventListener("change", function (event) {
          const file = event.target.files[0]; // Get the selected files as a FileList
          var input = document.getElementById("pcap-upload");
          if (file) {
            console.log("Selected file:", file.name);
            readFileContent(file);
          }
        });

      // Function to read the file content using FileReader
      function readFileContent(file) {
        const reader = new FileReader();

        // Define what happens when the file is loaded
        reader.onload = (event) => {
          // The file content is available in event.target.result
          contentTarget.textContent = event.target.result;
          console.log("File content:", event.target.result);
        };

        // Define what happens if an error occurs
        reader.onerror = (error) => {
          console.error("Error reading file:", error);
        };

        // Start reading the file as text (other methods available for different file types)
        // Use readAsText() for text files like .txt, .csv, .json
        // Use readAsDataURL() for images or other binary files to get a data URL
        reader.readAsText(file);
      }
    </script>
  </body>
</html>
