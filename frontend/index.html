<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PCAP Analysis Tool (by: oxagast)</title>

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Rubik+Glitch&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <style>
      body {
        background-image: url("background.jpg");
        background-repeat: no-repeat;
        background-size: cover;
        background-attachment: fixed;
      }
    </style>
  </head>

  <body>
    <div class="container_box">
      <div class="top_bar">PacketSnitch</div>

      <div class="entry_bar">
        <div class="logo-cont">
          <img src="logo.png" />
        </div>
        <label style="color: white">ip/hostname:</label>
        <input id="host_filter" type="text" placeholder="0.0.0.0" />
      </div>

      <div class="content_area">
        <div class="sidebar">
          <form
            method="post"
            enctype="multipart/form-data"
            id="jsonFile"
            name="jsonFile"
          >
            <input type="file" id="json-upload" name="json-up" hidden />
            <label for="json-upload" class="custom-btns">choose json</label>
          </form>
          <form
            method="post"
            enctype="multipart/form-data"
            id="pcapFile"
            name="pcapFile"
          >
            <input type="file" id="pcap-upload" name="pcap-up" hidden />
            <label for="pcap-upload" class="custom-btns">choose pcap</label>
          </form>
          <input
            type="button"
            id="summary-btn"
            value="Summary"
            class="custom-btns"
          />

          <br /><br />
          <!-- Dropdown menus -->
          <select id="target_hosts" hidden>
            <option>ALL hosts</option>
            <option>Localnet Hosts</option>
          </select>
        </div>

        <div id="main" class="main_panel">
          Analysis output will appear here...
        </div>
      </div>

      <div id="status" class="status_bar">Status: Ready</div>

      <div class="footer">oxasploits, llc (2026)</div>
    </div>
    <script type="text/javascript">
      const contentTarget = document.getElementById("json-upload");
      let packets = {};
      let final_summary = "";
      const form = document.getElementById("pcapFile");
      const fileInput = document.getElementById("pcap-upload");
      const status = document.getElementById("status");
      let hosts = ["0.0.0.0"];

      form.addEventListener("submit", function (event) {
        event.preventDefault();
        const files = fileInput.files;
        if (files.length > 0) {
          const file = files[0];
          const formData = new FormData();
          formData.append("myFile", file, file.name);
          fetch("/upload-endpoint", {
            method: "POST",
            body: formData,
          })
            .then((response) => response.json())
            .then((data) => {
              console.log("Success:", data);
              status.textContent = "File successfully uploaded!";
            })
            .catch((error) => {
              console.error("Error:", error);
              status.textContent = "File upload failed!";
            });
        } else {
          status.textContent = "Please select a file.";
        }
      });

      document
        .getElementById("json-upload")
        .addEventListener("change", function (event) {
          const file = event.target.files[0];
          if (file) {
            status.textContent = "Status: Selected file:" + file.name;
            processFile(file);
          }
        });

      function processFile(file) {
        const reader = new FileReader();
        reader.onload = (event) => {
          const main_panel = document.getElementById("main");
          packets = JSON.parse(event.target.result);
          final_summary = packets["Final Summary"];
          if (final_summary == undefined) {
            main_panel.textContent = "Error: Final Summary not found in JSON.";
            status.textContent = "Error: Final Summary is undefined.";
            return;
          }
          document.getElementById("target_hosts").hidden = false;
          for (const host in packets["Host"]) {
            if (!hosts.includes(host)) {
              hosts.push(host);
              const targets_list = document.getElementById("target_hosts");
              const newhost = document.createElement("option");
              newhost.textContent = host;
              newhost.value = host;
              targets_list.appendChild(newhost);
            }
          }
          main_panel.textContent = final_summary;
        };

        reader.onerror = (error) => {
          status.textContent = "Status: Error reading file: " + error;
        };

        reader.readAsText(file);
      }

      document
        .getElementById("target_hosts")
        .addEventListener("change", function () {
          const selected = document.getElementById("target_hosts").value;
          const main_panel = document.getElementById("main");
          main_panel.textContent = ""; // Clear previous content

          const hostPackets = packets["Host"][selected];
          for (const packet in hostPackets) {
            if (packet !== "Summary") {
              const packetData = hostPackets[packet];
              for (const key in packetData) {
                if (key === "Packet Info") {
                  const packetInfo = packetData[key];
                  for (const info in packetInfo) {
                    if (info === "IP") {
                      const ipInfo = packetInfo[info];
                      for (const ipKey in ipInfo) {
                        main_panel.textContent +=
                          ipKey + ": " + ipInfo[ipKey] + "\n";
                      }
                    }
                  }
                }
              }
            }
          }
        });

      document
        .getElementById("summary-btn")
        .addEventListener("click", function () {
          document.getElementById("main").textContent = final_summary;
        });
    </script>
    <br />
  </body>
</html>
